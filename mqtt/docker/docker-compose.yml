version: "3.8"

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: sb-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ../config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ../config/acl.conf:/mosquitto/config/acl.conf:ro
      - ../passwords:/mosquitto/passwords
      - ../data:/mosquitto/data
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/broker/uptime' -C 1 -W 3"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
