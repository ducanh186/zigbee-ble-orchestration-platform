services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: sb-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/acl.conf:/mosquitto/config/acl.conf:ro
      - ./mosquitto/passwords:/mosquitto/passwords
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -u monitor -P monitor123 -t '$$SYS/broker/uptime' -C 1 -W 3"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  cloud-api:
    build:
      context: ./cloud
      dockerfile: Dockerfile
    container_name: sb-cloud-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./cloud/.env
    volumes:
      - cloud-data:/app/data
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  mosquitto-data:
  cloud-data:
